<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VPN Manager</title>
  </head>
  <body>
    <section id="login-panel" class="login-panel" hidden>
      <form id="login-form" class="login-box">
        <div>
          <h1>VPN Manager</h1>
          <p>Административный вход</p>
        </div>
        <label class="form-label" for="login-username">Логин</label>
        <input id="login-username" class="form-control" name="username" value="admin" autocomplete="username">
        <label class="form-label" for="login-password">Пароль</label>
        <input id="login-password" class="form-control" name="password" type="password" autocomplete="current-password">
        <button class="btn btn-primary w-100" type="submit">Войти</button>
        <p id="login-error" class="text-danger" hidden>Неверный логин или пароль</p>
      </form>
    </section>

    <main class="shell">
      <section class="topbar">
        <div>
          <h1>VPN Manager</h1>
          <p id="server-state">Загрузка состояния...</p>
        </div>
        <div class="toolbar">
          <button id="refresh" class="btn btn-outline-primary" type="button">Обновить</button>
          <button id="logout" class="btn btn-outline-secondary" type="button">Выйти</button>
        </div>
      </section>

      <div id="global-busy" class="busy-bar" hidden>
        <span class="spinner-border spinner-border-sm" aria-hidden="true"></span>
        <span id="busy-message">Загрузка...</span>
      </div>
      <div id="notice" class="alert alert-info" role="status" hidden></div>

      <section class="panel">
        <div class="section-head">
          <h2>OpenVPN</h2>
          <div class="toolbar">
            <span id="openvpn-installed" class="badge text-bg-secondary">-</span>
            <span id="openvpn-active" class="badge text-bg-secondary">-</span>
          </div>
        </div>
        <dl class="status-grid">
          <div>
            <dt>Status log</dt>
            <dd id="openvpn-status-log">-</dd>
          </div>
          <div>
            <dt>Профили</dt>
            <dd id="openvpn-profile-dir">-</dd>
          </div>
        </dl>
      </section>

      <section id="setup-panel" class="panel" hidden>
        <h2>Первичная настройка</h2>
        <form id="setup-form" class="setup-form">
          <input id="public-host" class="form-control" name="publicHost" placeholder="example.com или IP" autocomplete="off">
          <input id="openvpn-port" class="form-control" name="port" type="number" min="1" max="65535" value="1194">
          <select id="openvpn-protocol" class="form-select" name="protocol">
            <option value="udp">UDP</option>
            <option value="tcp">TCP</option>
          </select>
          <select id="openvpn-dns" class="form-select" name="dns">
            <option value="3">1.1.1.1</option>
            <option value="2">Google</option>
            <option value="1">System</option>
            <option value="7">AdGuard</option>
          </select>
          <input id="first-client" class="form-control" name="firstClient" value="admin" autocomplete="off">
          <button class="btn btn-primary" type="submit">Сохранить</button>
        </form>
      </section>

      <section class="panel">
        <div class="section-head">
          <h2>VLESS</h2>
          <div class="toolbar">
            <span id="vless-installed" class="badge text-bg-secondary">-</span>
            <span id="vless-active" class="badge text-bg-secondary">-</span>
          </div>
        </div>
        <dl class="status-grid">
          <div>
            <dt>Xray config</dt>
            <dd id="vless-config">-</dd>
          </div>
          <div>
            <dt>Профили</dt>
            <dd id="vless-profile-dir">-</dd>
          </div>
        </dl>
      </section>

      <section class="panel">
        <div class="section-head">
          <h2>Клиенты</h2>
          <form id="client-form" class="inline-form">
            <input id="client-name" class="form-control" name="name" placeholder="client_name" autocomplete="off">
            <button class="btn btn-primary" type="submit">Создать</button>
          </form>
        </div>
        <div id="clients" class="content-list"></div>
      </section>

      <section class="panel">
        <h2>Подключения</h2>
        <div id="connections" class="content-list"></div>
      </section>

      <section class="panel">
        <h2>Доступ</h2>
        <form id="credentials-form" class="settings-form">
          <input id="settings-username" class="form-control" name="username" value="admin" autocomplete="username">
          <input class="form-control" name="password" type="password" placeholder="Новый пароль" autocomplete="new-password">
          <button class="btn btn-primary" type="submit">Сохранить</button>
        </form>
      </section>

      <section class="panel">
        <h2>События</h2>
        <div id="events" class="content-list"></div>
      </section>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
